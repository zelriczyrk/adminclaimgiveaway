<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body { background: #111; color: white; text-align: center; font-family: sans-serif; }
        .item { background: #222; padding: 15px; margin: 15px auto; width: 300px; border-radius: 10px; border: 1px solid #ff4757; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 5px; margin: 5px; }
        .approve { background: #2ed573; } .reject { background: #ff4757; color: white; }
    </style>
</head>
<body>
    <h1>Admin Panel</h1>
    <div id="list"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDNatItZjr5377IioYH_dkBj2ymwJSNFFI",
        authDomain: "zrcg-31419.firebaseapp.com",
        projectId: "zrcg-31419",
        storageBucket: "zrcg-31419.firebasestorage.app",
        messagingSenderId: "718920885368",
        appId: "1:718920885368:web:78f798e22e5a1a2733798d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadClaims() {
        const snap = await getDocs(collection(db, "claims"));
        let html = "";
        snap.forEach(d => {
            html += `<div class="item">
                <h3>${d.data().username}</h3>
                <p>Robux: ${d.data().robux}</p>
                <p>Status: ${d.data().status}</p>
                <button class="approve" onclick="approve('${d.id}')">Approve</button>
                <button class="reject" onclick="reject('${d.id}')">Reject</button>
            </div>`;
        });
        document.getElementById("list").innerHTML = html;
    }

    window.approve = async (id) => { await updateDoc(doc(db, "claims", id), { status: "Approved" }); location.reload(); }
    window.reject = async (id) => { await deleteDoc(doc(db, "claims", id)); location.reload(); }

    window.onload = loadClaims;
</script>
</body>
</html>
