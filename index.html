<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<style>
    body { background: radial-gradient(circle, #2a1a1a 0%, #1a0f0f 100%); color: #fff; font-family: 'Arial', sans-serif; text-align: center; min-height: 100vh; padding: 20px; }
    .item { 
        background: #251616; padding: 20px; margin: 15px auto; width: 300px; 
        border-radius: 15px; border: 1px solid #ff4757; box-shadow: 0 0 15px #ff4757;
    }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
    .btn-approve { background: #2ed573; color: black; }
    .btn-reject { background: #ff4757; color: white; }
</style>
</head>
<body>

<h1>Admin Panel</h1>
<div id="list"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDNatItZjr5377IioYH_dkBj2ymwJSNFFI",
        authDomain: "zrcg-31419.firebaseapp.com",
        projectId: "zrcg-31419",
        storageBucket: "zrcg-31419.firebasestorage.app",
        messagingSenderId: "718920885368",
        appId: "1:718920885368:web:78f798e22e5a1a2733798d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadClaims() {
        const querySnapshot = await getDocs(collection(db, "claims"));
        let html = "";
        querySnapshot.forEach((d) => {
            const data = d.data();
            html += `
            <div class="item">
                <h3>${data.username}</h3>
                <p>Amount: ${data.robux}</p>
                <p>Status: <strong>${data.status}</strong></p>
                <button class="btn-approve" onclick="updateStatus('${d.id}', 'Approved')">Approve</button>
                <button class="btn-reject" onclick="updateStatus('${d.id}', 'Rejected')">Reject</button>
            </div>`;
        });
        document.getElementById("list").innerHTML = html;
    }

    window.updateStatus = async (id, status) => {
        await updateDoc(doc(db, "claims", id), { status: status });
        location.reload();
    }
    window.onload = loadClaims;
</script>
</body>
</html>
